<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nails 4-U | Contact</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#050507;--text:#f5f5f5;--muted:#b3b3b3;
    --gold:#e4c58a;--gold-soft:rgba(228,197,138,0.25);--card:#111118;
}
body.dark {
    --bg:#f5f5f5;--text:#111;--muted:#555;
    --gold:#c59b4f;--gold-soft:rgba(197,155,79,0.18);--card:#f9f6f0;
}
body {
    margin:0;font-family:"Inter",sans-serif;
    background:radial-gradient(circle at top,#151520 0,var(--bg) 45%);
    color:var(--text);
}
.navbar {
    position:sticky;top:0;z-index:50;
    backdrop-filter:blur(16px);
    background:rgba(0,0,0,0.55);
    border-bottom:1px solid rgba(255,255,255,0.05);
    padding:14px 7vw;
    display:flex;justify-content:space-between;align-items:center;
}
.logo {display:flex;align-items:center;gap:10px;}
.logo-mark {
    width:32px;height:32px;border-radius:999px;
    border:1px solid var(--gold-soft);
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);font-family:"Playfair Display",serif;
}
.logo-text {
    font-family:"Playfair Display",serif;
    letter-spacing:0.12em;font-size:14px;text-transform:uppercase;
}
.nav-links {display:flex;gap:22px;}
.nav-links a {
    text-decoration:none;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.16em;font-size:11px;
}
.nav-links a:hover {color:var(--gold);}
.theme-toggle {
    border-radius:999px;border:1px solid var(--gold-soft);
    background:transparent;color:var(--gold);padding:6px 10px;cursor:pointer;
}
.page {
    padding:60px 7vw 50px;
    max-width:1000px;margin:auto;
    display:grid;grid-template-columns:1.1fr 1fr;gap:30px;
}
h1 {
    font-family:"Playfair Display",serif;
    font-size:32px;margin-bottom:6px;
}
.page-sub {color:var(--muted);font-size:14px;margin-bottom:26px;}
form {
    display:flex;flex-direction:column;gap:12px;
}
input,textarea {
    padding:12px;border-radius:10px;
    border:1px solid rgba(255,255,255,0.12);
    background:var(--card);color:var(--text);
}
textarea {min-height:120px;resize:vertical;}
button {
    padding:12px;border-radius:999px;border:none;
    background:radial-gradient(circle at top,#ffffff,#f5e3c0);
    color:#111;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
    cursor:pointer;box-shadow:0 0 18px rgba(228,197,138,0.55);
}
.info-card {
    background:var(--card);
    border-radius:18px;
    padding:18px;
    border:1px solid rgba(255,255,255,0.06);
    font-size:14px;
}
.info-card h2 {
    font-family:"Playfair Display",serif;
    font-size:20px;margin-top:0;margin-bottom:10px;
}
.info-line {margin-bottom:8px;color:var(--muted);}
iframe {
    width:100%;border:0;border-radius:14px;margin-top:12px;
}
footer {
    text-align:center;padding:24px 0;font-size:12px;
    color:var(--muted);border-top:1px solid rgba(255,255,255,0.06);
}
@media (max-width:900px){
    .page{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <div class="logo-mark">N</div>
        <div class="logo-text">Nails 4‑U</div>
    </div>
    <div class="nav-links">
        <a href="index.html#home">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="booking.html">Book</a>
        <a href="contact.html">Contact</a>
    </div>
    <button id="themeToggle" class="theme-toggle">☾</button>
</nav>

<div class="page">
    <div>
        <h1>Contact Us</h1>
        <div class="page-sub">Questions, special requests, or group bookings? Send us a message.</div>

        <form action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <div class="info-card">
        <h2>Visit the Salon</h2>
        <div class="info-line">📍 6921 Miramar Pkwy, Miramar, FL 33023</div>
        <div class="info-line">📞 (954) 505‑3926</div>
        <div class="info-line">Mon–Sat: 9:30 AM – 7:00 PM</div>
        <div class="info-line">Sunday: 10:00 AM – 5:00 PM</div>

        <iframe
            src="https://www.google.com/maps?q=6921+Miramar+Pkwy,+Miramar,+FL+33023&output=embed"
            height="220" loading="lazy">
        </iframe>
    </div>
</div>

<footer>
    © <span id="year"></span> Nails 4‑U Miramar. All rights reserved.
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
const toggle = document.getElementById("themeToggle");
toggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    toggle.textContent = document.body.classList.contains("dark") ? "☀" : "☾";
});
</script>

</body>
</html>
