<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nails 4-U | Gallery</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050507;
    --bg-soft: #0b0b10;
    --text: #f5f5f5;
    --muted: #b3b3b3;
    --gold: #e4c58a;
    --gold-soft: rgba(228,197,138,0.25);
    --card: #111118;
}
body.dark {
    --bg: #f5f5f5;
    --bg-soft: #ffffff;
    --text: #111111;
    --muted: #555555;
    --gold: #c59b4f;
    --gold-soft: rgba(197,155,79,0.18);
    --card: #f9f6f0;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #151520 0, var(--bg) 45%);
    color: var(--text);
    scroll-behavior: smooth;
}
.navbar {
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(16px);
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
    border-bottom: 1px solid rgba(255,255,255,0.04);
    padding: 14px 7vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
}
.logo-mark {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1px solid var(--gold-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 16px;
    font-family: "Playfair Display", serif;
}
.logo-text {
    font-family: "Playfair Display", serif;
    letter-spacing: 0.12em;
    font-size: 14px;
    text-transform: uppercase;
}
.nav-links {
    display: flex;
    gap: 22px;
    font-size: 14px;
}
.nav-links a {
    text-decoration: none;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 11px;
    transition: color 0.25s ease, transform 0.25s ease;
}
.nav-links a:hover {
    color: var(--gold);
    transform: translateY(-1px);
}
.nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
}
.theme-toggle {
    border-radius: 999px;
    border: 1px solid var(--gold-soft);
    background: transparent;
    color: var(--gold);
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
}
.btn-ghost {
    background: transparent;
    border-radius: 999px;
    border: 1px solid var(--gold-soft);
    color: var(--gold);
    padding: 9px 18px;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
}
.page {
    padding: 70px 7vw 60px;
    max-width: 1100px;
    margin: auto;
}
h1 {
    font-family: "Playfair Display", serif;
    font-size: 32px;
    margin-bottom: 6px;
}
.page-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 26px;
}
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 16px;
}
.gallery-grid img {
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.55);
    transition: 0.25s ease;
}
.gallery-grid img:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 16px 40px rgba(0,0,0,0.7);
}
footer {
    text-align: center;
    padding: 24px 0;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid rgba(255,255,255,0.06);
}
@media (max-width: 700px) {
    .navbar {
        flex-wrap: wrap;
        gap: 10px;
        padding-inline: 5vw;
    }
    .nav-links {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
        gap: 14px;
    }
    .page {
        padding-inline: 5vw;
    }
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <div class="logo-mark">N</div>
        <div class="logo-text">Nails 4‑U</div>
    </div>
    <div class="nav-links">
        <a href="index.html#home">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="booking.html">Book</a>
        <a href="contact.html">Contact</a>
    </div>
    <div class="nav-right">
        <button class="btn-ghost" onclick="location.href='booking.html'">Book Now</button>
        <button id="themeToggle" class="theme-toggle">☾</button>
    </div>
</nav>

<div class="page">
    <h1>Recent Work</h1>
    <div class="page-sub">Acrylic sets, gel designs, and spa pedicures by Kevin & team.</div>
    <div class="gallery-grid">
        <img src="Acrylic1.png" alt="Acrylic 1">
        <img src="Acrylic2.png" alt="Acrylic 2">
        <img src="Acrylic3.png" alt="Acrylic 3">
        <img src="Acrylic4.png" alt="Acrylic 4">
    </div>
</div>

<footer>
    © <span id="year"></span> Nails 4‑U Miramar. All rights reserved.
</footer>

<script>
// Auto year
document.getElementById("year").textContent = new Date().getFullYear();
// Theme toggle
const toggle = document.getElementById("themeToggle");
toggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    toggle.textContent = document.body.classList.contains("dark") ? "☀" : "☾";
});
</script>

</body>
</html>
